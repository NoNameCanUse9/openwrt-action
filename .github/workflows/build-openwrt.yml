name: Build ImmortalWrt Firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture (e.g. x86/64, mediatek/filogic)'
        required: true
        default: 'x86/64'
        type: string
      version:
        description: 'ImmortalWrt version'
        required: true
        default: '24.10'
        type: choice
        options:
          - '24.10'
          - '23.05'
          - 'snapshot'
      format:
        description: 'Output image format'
        required: true
        default: 'default'
        type: choice
        options:
          - 'default'
          - 'ext4'
          - 'squashfs'
          - 'efi-ext4'
          - 'efi-squashfs'
          - 'qcow2'
          - 'vmdk'
          - 'vdi'
      packages:
        description: 'Additional packages (space-separated, appended to .config)'
        required: false
        default: ''
        type: string

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build firmware
        run: |
          python3 scripts/build.py \
            --target "${{ inputs.target }}" \
            --version "${{ inputs.version }}" \
            --format "${{ inputs.format }}" \
            --packages "${{ inputs.packages }}" \
            --output output

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.REPO_NAME }}-${{ inputs.version }}-${{ inputs.target }}-${{ inputs.format }}
          path: output/**
          compression-level: 0
          retention-days: 7
